name: Build CachyOS Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_variant:
        description: Kernel variant
        required: true
        type: choice
        options:
          - linux-cachyos
          - linux-cachyos-bmq
          - linux-cachyos-bore
          - linux-cachyos-rc
          - linux-cachyos-lts
          - linux-cachyos-hardened
          - linux-cachyos-server
          - linux-cachyos-eevdf
          - linux-cachyos-rt-bore
          - linux-cachyos-deckify
        default: linux-cachyos

      enable_lto:
        description: Enable ThinLTO
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'

      enable_o3:
        description: Enable -O3 optimization
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

      use_bbr3:
        description: Enable BBRv3 as default TCP congestion control
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

permissions:
  contents: read

env:
  PKGBASE_SUFFIX: '-custom'
  _use_llvm_lto: ${{ github.event.inputs.enable_lto == 'true' && 'thin' || 'none' }}
  _kernel_cflags: ${{ github.event.inputs.enable_o3 == 'true' && '-O3' || '' }}
  _tcp_bbr3: ${{ github.event.inputs.use_bbr3 == 'true' && 'yes' || 'no' }}

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-latest
    timeout-minutes: 360

    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    env:
      KERNEL_VARIANT: ${{ github.event.inputs.kernel_variant }}

    steps:
      - name: Initialize pacman
        run: |
          set -euxo pipefail

          pacman-key --init
          pacman-key --populate archlinux

          pacman -Syu --noconfirm --needed \
            git \
            nodejs

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          set -euxo pipefail

          pacman -S --noconfirm --needed \
            base-devel \
            fakeroot \
            sudo \
            kmod \
            bc \
            cpio \
            xmlto \
            flex \
            bison \
            libelf \
            openssl \
            python-sphinx \
            python-sphinx_rtd_theme \
            clang \
            lld \
            llvm \
            wget \
            zstd \
            tar \
            findutils \
            coreutils \
            grep \
            sed \
            gawk \
            pahole

      - name: Clone CachyOS PKGBUILD
        run: |
          set -euxo pipefail

          git clone --depth 1 https://github.com/CachyOS/linux-cachyos.git cachyos-pkgbuild

          test -f "cachyos-pkgbuild/$KERNEL_VARIANT/PKGBUILD"
          test -f "cachyos-pkgbuild/$KERNEL_VARIANT/config"

      - name: Customize package name
        run: |
          set -euxo pipefail

          cd "cachyos-pkgbuild/$KERNEL_VARIANT"

          # Original PKGBUILD usually contains something like:
          #   pkgbase="linux-$_pkgsuffix"
          #
          # Write it back as:
          #   pkgbase="linux-${_pkgsuffix}-custom"
          #
          # Do not validate by grepping the raw PKGBUILD line, because the file
          # intentionally contains shell variables. Validate the evaluated value instead.
          sed -i "s|^pkgbase=.*|pkgbase=\"linux-\${_pkgsuffix}${PKGBASE_SUFFIX}\"|" PKGBUILD

          grep '^pkgbase=' PKGBUILD

          EXPECTED_PKGBASE="${KERNEL_VARIANT}${PKGBASE_SUFFIX}"

          ACTUAL_PKGBASE="$(
            bash -c '
              source ./PKGBUILD
              printf "%s\n" "$pkgbase"
            '
          )"

          echo "Expected pkgbase: $EXPECTED_PKGBASE"
          echo "Actual pkgbase:   $ACTUAL_PKGBASE"

          test "$ACTUAL_PKGBASE" = "$EXPECTED_PKGBASE"

      - name: Build kernel packages
        run: |
          set -euxo pipefail

          useradd -m builder

          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder

          chown -R builder:builder "$GITHUB_WORKSPACE"

          runuser -u builder -- env \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            KERNEL_VARIANT="$KERNEL_VARIANT" \
            _use_llvm_lto="$_use_llvm_lto" \
            _kernel_cflags="$_kernel_cflags" \
            _tcp_bbr3="$_tcp_bbr3" \
            bash -lc '
              set -e

              cd "$GITHUB_WORKSPACE/cachyos-pkgbuild/$KERNEL_VARIANT"

              set +o pipefail
              yes "" | makepkg -s --noconfirm --nocheck --skipchecksums
              status=${PIPESTATUS[1]}
              set -o pipefail

              exit "$status"
            '

          mkdir -p "$GITHUB_WORKSPACE/artifacts"

          cp -v cachyos-pkgbuild/"$KERNEL_VARIANT"/*.pkg.tar.zst "$GITHUB_WORKSPACE/artifacts/"

          ls -lah "$GITHUB_WORKSPACE/artifacts"

      - name: Create cross-distro archives
        run: |
          set -euxo pipefail

          cd "$GITHUB_WORKSPACE/artifacts"

          PKG_BASE="${KERNEL_VARIANT}${PKGBASE_SUFFIX}"

          KERNEL_PKG="$(
            find . -maxdepth 1 -type f \
              -name "${PKG_BASE}-*.pkg.tar.zst" \
              ! -name "*-headers-*" \
              ! -name "*-debug-*" \
              ! -name "*-dbg-*" \
              -printf '%f\n' \
              | sort -V \
              | head -n 1
          )"

          if [[ -z "$KERNEL_PKG" ]]; then
            echo "No kernel package found for package base: $PKG_BASE"
            exit 1
          fi

          echo "Kernel package: $KERNEL_PKG"

          rm -rf /tmp/kernel-extract
          mkdir -p /tmp/kernel-extract

          tar --zstd -xf "$KERNEL_PKG" -C /tmp/kernel-extract

          test -d /tmp/kernel-extract/usr/lib/modules

          KVER="$(
            find /tmp/kernel-extract/usr/lib/modules \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -printf '%f\n' \
              | sort -V \
              | head -n 1
          )"

          if [[ -z "$KVER" ]]; then
            echo "No kernel module version directory found"
            exit 1
          fi

          MODSRC="/tmp/kernel-extract/usr/lib/modules/$KVER"

          test -d "$MODSRC"
          test -d "$MODSRC/kernel"

          echo "Kernel release: $KVER"

          OUT="cachyos-kernel-$KVER-rootfs"

          rm -rf "$OUT"
          mkdir -p "$OUT/boot"
          mkdir -p "$OUT/lib/modules/$KVER"

          # Arch/CachyOS kernel packages commonly place vmlinuz here:
          #   /usr/lib/modules/$KVER/vmlinuz
          #
          # Some packages may still place it under /boot, so keep a fallback.
          if [[ -f "$MODSRC/vmlinuz" ]]; then
            install -Dm644 "$MODSRC/vmlinuz" "$OUT/boot/vmlinuz-$KVER"
          else
            find /tmp/kernel-extract \
              -type f \
              -path "*/boot/vmlinuz*" \
              -exec install -Dm644 {} "$OUT/boot/vmlinuz-$KVER" \; \
              -quit
          fi

          if [[ ! -f "$OUT/boot/vmlinuz-$KVER" ]]; then
            echo "No vmlinuz found in kernel package"
            exit 1
          fi

          if find /tmp/kernel-extract -type f -name "System.map*" | grep -q .; then
            find /tmp/kernel-extract \
              -type f \
              -name "System.map*" \
              -exec install -Dm644 {} "$OUT/boot/System.map-$KVER" \; \
              -quit
          fi

          if find /tmp/kernel-extract -type f \( -name "config" -o -name "config-*" -o -name ".config" \) | grep -q .; then
            find /tmp/kernel-extract \
              -type f \( -name "config" -o -name "config-*" -o -name ".config" \) \
              -exec install -Dm644 {} "$OUT/boot/config-$KVER" \; \
              -quit
          fi

          # Copy modules into the standard depmod rootfs location:
          #   $OUT/lib/modules/$KVER
          cp -a "$MODSRC"/. "$OUT/lib/modules/$KVER/"

          depmod -b "$PWD/$OUT" "$KVER"

          test -f "$OUT/boot/vmlinuz-$KVER"
          test -d "$OUT/lib/modules/$KVER/kernel"
          test -f "$OUT/lib/modules/$KVER/modules.dep"
          test -f "$OUT/lib/modules/$KVER/modules.alias"
          test -f "$OUT/lib/modules/$KVER/modules.symbols"
          test -f "$OUT/lib/modules/$KVER/modules.builtin"
          test -f "$OUT/lib/modules/$KVER/modules.builtin.modinfo"
          test -f "$OUT/lib/modules/$KVER/modules.order"

          tar --zstd -C "$OUT" -chf "$OUT.tar.zst" .

          rm -rf "$OUT"

          HEADERS_PKG="$(
            find . -maxdepth 1 -type f \
              -name "${PKG_BASE}-headers-*.pkg.tar.zst" \
              -printf '%f\n' \
              | sort -V \
              | head -n 1
          )"

          if [[ -n "$HEADERS_PKG" ]]; then
            echo "Headers package: $HEADERS_PKG"

            HDR_OUT="cachyos-headers-$KVER-rootfs"

            rm -rf "$HDR_OUT"
            mkdir -p "$HDR_OUT"

            tar --zstd -xf "$HEADERS_PKG" -C "$HDR_OUT"

            test -d "$HDR_OUT/usr" || {
              echo "Headers package did not contain /usr"
              exit 1
            }

            tar --zstd -C "$HDR_OUT" -chf "$HDR_OUT.tar.zst" .

            rm -rf "$HDR_OUT"
          else
            echo "No headers package found for package base: $PKG_BASE"
          fi

          echo "Generated artifacts:"
          ls -lah

      - name: Validate generated artifacts
        run: |
          set -euxo pipefail

          cd "$GITHUB_WORKSPACE/artifacts"

          PKG_BASE="${KERNEL_VARIANT}${PKGBASE_SUFFIX}"

          KERNEL_PKG="$(
            find . -maxdepth 1 -type f \
              -name "${PKG_BASE}-*.pkg.tar.zst" \
              ! -name "*-headers-*" \
              ! -name "*-debug-*" \
              ! -name "*-dbg-*" \
              -printf '%f\n' \
              | sort -V \
              | head -n 1
          )"

          if [[ -z "$KERNEL_PKG" ]]; then
            echo "Missing pacman kernel package"
            exit 1
          fi

          HEADERS_PKG="$(
            find . -maxdepth 1 -type f \
              -name "${PKG_BASE}-headers-*.pkg.tar.zst" \
              -printf '%f\n' \
              | sort -V \
              | head -n 1
          )"

          if [[ -z "$HEADERS_PKG" ]]; then
            echo "Missing pacman headers package"
            exit 1
          fi

          KERNEL_ROOTFS_TAR="$(
            find . -maxdepth 1 -type f \
              -name "cachyos-kernel-*-rootfs.tar.zst" \
              -printf '%f\n' \
              | sort -V \
              | head -n 1
          )"

          if [[ -z "$KERNEL_ROOTFS_TAR" ]]; then
            echo "Missing cross-distro kernel rootfs archive"
            exit 1
          fi

          rm -rf /tmp/kernel-rootfs-check
          mkdir -p /tmp/kernel-rootfs-check

          tar --zstd -xf "$KERNEL_ROOTFS_TAR" -C /tmp/kernel-rootfs-check

          test -d /tmp/kernel-rootfs-check/boot
          test -d /tmp/kernel-rootfs-check/lib/modules

          KVER="$(
            find /tmp/kernel-rootfs-check/lib/modules \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -printf '%f\n' \
              | sort -V \
              | head -n 1
          )"

          test -n "$KVER"

          test -f "/tmp/kernel-rootfs-check/boot/vmlinuz-$KVER"
          test -d "/tmp/kernel-rootfs-check/lib/modules/$KVER/kernel"
          test -f "/tmp/kernel-rootfs-check/lib/modules/$KVER/modules.dep"
          test -f "/tmp/kernel-rootfs-check/lib/modules/$KVER/modules.alias"
          test -f "/tmp/kernel-rootfs-check/lib/modules/$KVER/modules.symbols"
          test -f "/tmp/kernel-rootfs-check/lib/modules/$KVER/modules.builtin"
          test -f "/tmp/kernel-rootfs-check/lib/modules/$KVER/modules.builtin.modinfo"
          test -f "/tmp/kernel-rootfs-check/lib/modules/$KVER/modules.order"

          HEADERS_ROOTFS_TAR="$(
            find . -maxdepth 1 -type f \
              -name "cachyos-headers-*-rootfs.tar.zst" \
              -printf '%f\n' \
              | sort -V \
              | head -n 1
          )"

          if [[ -z "$HEADERS_ROOTFS_TAR" ]]; then
            echo "Missing cross-distro headers rootfs archive"
            exit 1
          fi

          rm -rf /tmp/headers-rootfs-check
          mkdir -p /tmp/headers-rootfs-check

          tar --zstd -xf "$HEADERS_ROOTFS_TAR" -C /tmp/headers-rootfs-check

          test -d /tmp/headers-rootfs-check/usr

          echo "Artifact validation passed"

          ls -lah "$GITHUB_WORKSPACE/artifacts"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-${{ env.KERNEL_VARIANT }}${{ env.PKGBASE_SUFFIX }}
          path: artifacts/
          if-no-files-found: error
          compression-level: 0
