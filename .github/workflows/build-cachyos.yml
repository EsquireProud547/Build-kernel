name: Build CachyOS Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_variant:
        description: Kernel variant
        required: true
        type: choice
        options:
          - linux-cachyos
          - linux-cachyos-rc
          - linux-cachyos-lts
          - linux-cachyos-hardened
          - linux-cachyos-server
          - linux-cachyos-eevdf
          - linux-cachyos-deckify
        default: linux-cachyos

      enable_lto:
        description: Enable ThinLTO
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    env:
      KERNEL_VARIANT: ${{ github.event.inputs.kernel_variant }}
      ENABLE_LTO: ${{ github.event.inputs.enable_lto }}

    steps:
      - name: Initialize pacman
        run: |
          set -euxo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm --needed git nodejs

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pacman -S --noconfirm --needed \
            base-devel fakeroot sudo \
            bc cpio xmlto flex bison libelf openssl \
            python-sphinx python-sphinx_rtd_theme \
            clang lld llvm wget zstd

      - name: Clone CachyOS PKGBUILD
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/CachyOS/linux-cachyos.git cachyos-pkgbuild
          test -f "cachyos-pkgbuild/$KERNEL_VARIANT/PKGBUILD"
          test -f "cachyos-pkgbuild/$KERNEL_VARIANT/config"

      - name: Configure LTO
        run: |
          set -euxo pipefail
          cd "cachyos-pkgbuild/$KERNEL_VARIANT"

          if [[ "$ENABLE_LTO" == "true" ]]; then
            LTO_VALUE="thin"
          else
            LTO_VALUE="none"
          fi

          if grep -q '^_use_llvm_lto=' PKGBUILD; then
            sed -i "s/^_use_llvm_lto=.*/_use_llvm_lto=\"$LTO_VALUE\"/" PKGBUILD
          else
            echo "_use_llvm_lto=\"$LTO_VALUE\"" >> PKGBUILD
          fi

      - name: Build kernel package
        run: |
          set -euxo pipefail

          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder

          chown -R builder:builder "$GITHUB_WORKSPACE"

          runuser -u builder -- env \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            KERNEL_VARIANT="$KERNEL_VARIANT" \
            bash -lc '
              set -e
              cd "$GITHUB_WORKSPACE/cachyos-pkgbuild/$KERNEL_VARIANT"

              set +o pipefail
              yes "" | makepkg -s --noconfirm --nocheck
              status=${PIPESTATUS[1]}
              set -o pipefail

              exit "$status"
            '

          mkdir -p "$GITHUB_WORKSPACE/artifacts"

          shopt -s nullglob
          packages=(cachyos-pkgbuild/"$KERNEL_VARIANT"/*.pkg.tar.zst)

          if (( ${#packages[@]} == 0 )); then
            echo "No packages were produced"
            exit 1
          fi

          cp -v "${packages[@]}" "$GITHUB_WORKSPACE/artifacts/"

      - name: Extract kernel files
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/artifacts"

          mkdir -p /tmp/pkg-extract

          PKG="$(
            find . -maxdepth 1 -type f \
              -name "$KERNEL_VARIANT-*.pkg.tar.zst" \
              ! -name "*-headers-*.pkg.tar.zst" \
              -printf '%f\n' | sort | head -n 1
          )"

          if [[ -n "$PKG" ]] && tar --zstd -xf "$PKG" -C /tmp/pkg-extract; then
            find /tmp/pkg-extract -type f -path "*/boot/vmlinuz*" -exec cp -v {} ./ \; || true
            find /tmp/pkg-extract -type f -name "System.map*" -exec cp -v {} ./ \; || true
            find /tmp/pkg-extract -type f -name "config*" -exec cp -v {} ./ \; || true
          fi

          ls -lah

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-${{ github.event.inputs.kernel_variant }}
          path: artifacts/
          if-no-files-found: error
          compression-level: 0
