name: Build CachyOS Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_variant:
        description: Kernel variant
        required: true
        type: choice
        options:
          - linux-cachyos
          - linux-cachyos-bmq
          - linux-cachyos-bore
          - linux-cachyos-rc
          - linux-cachyos-lts
          - linux-cachyos-hardened
          - linux-cachyos-server
          - linux-cachyos-eevdf
          - linux-cachyos-rt-bore
          - linux-cachyos-deckify
        default: linux-cachyos
      enable_lto:
        description: Enable ThinLTO
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'true'
      enable_o3:
        description: Enable -O3 optimization (default kernel uses -O2)
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'
      use_bbr3:
        description: Set BBR3 as default TCP congestion control algorithm
        required: true
        type: choice
        options:
          - 'true'
          - 'false'
        default: 'false'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: archlinux:latest
    defaults:
      run:
        shell: bash
    env:
      KERNEL_VARIANT: ${{ github.event.inputs.kernel_variant }}
      ENABLE_LTO: ${{ github.event.inputs.enable_lto }}
      ENABLE_O3: ${{ github.event.inputs.enable_o3 }}
      USE_BBR3: ${{ github.event.inputs.use_bbr3 }}

    steps:
      - name: Initialize pacman
        run: |
          set -euxo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm --needed git nodejs

      # v5 uses Node.js 24, avoids deprecation after 2026-06-02
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pacman -S --noconfirm --needed \
            base-devel fakeroot sudo \
            bc cpio xmlto flex bison libelf openssl \
            python-sphinx python-sphinx_rtd_theme \
            clang lld llvm wget zstd

      - name: Clone CachyOS PKGBUILD
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/CachyOS/linux-cachyos.git cachyos-pkgbuild
          test -f "cachyos-pkgbuild/$KERNEL_VARIANT/PKGBUILD"
          test -f "cachyos-pkgbuild/$KERNEL_VARIANT/config"

      - name: Configure LTO
        run: |
          set -euxo pipefail
          cd "cachyos-pkgbuild/$KERNEL_VARIANT"
          LTO_VALUE="$([[ "$ENABLE_LTO" == "true" ]] && echo "thin" || echo "none")"
          # Use \s* to handle possible leading whitespace in PKGBUILD
          if grep -q '^\s*_use_llvm_lto=' PKGBUILD; then
            sed -i "s/^\s*_use_llvm_lto=.*/_use_llvm_lto=\"$LTO_VALUE\"/" PKGBUILD
          else
            echo "_use_llvm_lto=\"$LTO_VALUE\"" >> PKGBUILD
          fi

      - name: Configure optimization level
        run: |
          set -euxo pipefail
          cd "cachyos-pkgbuild/$KERNEL_VARIANT"
          if [[ "$ENABLE_O3" == "true" ]]; then
            if grep -q '^\s*_kernel_cflags=' PKGBUILD; then
              sed -i 's/^\s*_kernel_cflags=.*/_kernel_cflags="-O3"/' PKGBUILD
            else
              echo '_kernel_cflags="-O3"' >> PKGBUILD
            fi
          fi

      - name: Configure default TCP congestion control
        run: |
          set -euxo pipefail
          if [[ "$USE_BBR3" == "true" ]]; then
            cd "cachyos-pkgbuild/$KERNEL_VARIANT"

            # Step 1: Ensure BBR3 is built-in (not a module)
            if grep -q '^CONFIG_TCP_CONG_BBR3=' config; then
              sed -i 's/^CONFIG_TCP_CONG_BBR3=.*/CONFIG_TCP_CONG_BBR3=y/' config
            else
              echo 'CONFIG_TCP_CONG_BBR3=y' >> config
            fi

            # Step 2: Set BBR3 as the default TCP congestion control algorithm
            if grep -q '^CONFIG_DEFAULT_TCP_CONG=' config; then
              sed -i 's/^CONFIG_DEFAULT_TCP_CONG=.*/CONFIG_DEFAULT_TCP_CONG="bbr3"/' config
            else
              {
                echo 'CONFIG_DEFAULT_TCP_CONG="bbr3"'
                echo 'CONFIG_DEFAULT_CUBIC is not set'
              } >> config
            fi

            # Step 3: Verify the changes
            grep -E '^CONFIG_TCP_CONG_BBR3=|^CONFIG_DEFAULT_TCP_CONG=' config
          fi

      - name: Build kernel package
        run: |
          set -euxo pipefail
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser -u builder -- env \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            KERNEL_VARIANT="$KERNEL_VARIANT" \
            bash -lc '
              set -e
              cd "$GITHUB_WORKSPACE/cachyos-pkgbuild/$KERNEL_VARIANT"
              # yes "" handles any remaining prompts despite --noconfirm
              set +o pipefail
              yes "" | makepkg -s --noconfirm --nocheck
              status=${PIPESTATUS[1]}
              set -o pipefail
              exit "$status"
            '
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          shopt -s nullglob
          packages=(cachyos-pkgbuild/"$KERNEL_VARIANT"/*.pkg.tar.zst)
          if (( ${#packages[@]} == 0 )); then
            echo "No packages were produced"; exit 1
          fi
          cp -v "${packages[@]}" "$GITHUB_WORKSPACE/artifacts/"

      - name: Extract kernel for cross-distro use
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/artifacts"

          PKG="$(find . -maxdepth 1 -type f -name "$KERNEL_VARIANT-*.pkg.tar.zst" \
            ! -name "*-headers-*" -printf '%f\n' | sort | head -n 1)"
          [[ -z "$PKG" ]] && { echo "No package found"; exit 1; }
          # MUST create target dir before tar -C; tar does not auto-create
          mkdir -p /tmp/kernel-extract
          tar --zstd -xf "$PKG" -C /tmp/kernel-extract

          KVER="$(ls /tmp/kernel-extract/usr/lib/modules/ 2>/dev/null | head -1)"
          echo "Kernel release: $KVER"

          find /tmp/kernel-extract -type f -path "*/boot/vmlinuz*" -exec cp -v {} ./ \; || true
          find /tmp/kernel-extract -type f -name "System.map*" -exec cp -v {} ./ \; || true
          find /tmp/kernel-extract -type f -name "config*" -exec cp -v {} ./ \; || true

          if [[ -n "$KVER" ]]; then
            mkdir -p "modules/$KVER"
            cp -a "/tmp/kernel-extract/usr/lib/modules/$KVER/"* "modules/$KVER/" 2>/dev/null || true
          fi

          HDR_PKG="$(find . -maxdepth 1 -type f -name "$KERNEL_VARIANT-headers-*.pkg.tar.zst" \
            -printf '%f\n' | head -n 1)"
          if [[ -n "$HDR_PKG" ]]; then
            mkdir -p /tmp/headers-extract
            tar --zstd -xf "$HDR_PKG" -C /tmp/headers-extract
            cp -a /tmp/headers-extract/usr modules/ 2>/dev/null || true
          fi

          if [[ -n "$KVER" ]]; then
            mkdir -p "cachyos-full/$KVER"
            mv -v vmlinuz-* "cachyos-full/$KVER/vmlinuz" 2>/dev/null || true
            mv -v System.map-* "cachyos-full/$KVER/" 2>/dev/null || true
            mv -v config-* "cachyos-full/$KVER/" 2>/dev/null || true
            mv -v modules "cachyos-full/$KVER/" 2>/dev/null || true
            tar --zstd -chf "cachyos-kernel-$KVER.tar.zst" "cachyos-full/"
            rm -rf "cachyos-full"
          fi

          ls -lah

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-${{ github.event.inputs.kernel_variant }}
          path: artifacts/
          if-no-files-found: error
          compression-level: 0
