name: Build CachyOS Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_variant:
        description: Kernel variant
        required: true
        type: choice
        options:
          - linux-cachyos
          - linux-cachyos-rc
          - linux-cachyos-lts
          - linux-cachyos-hardened
          - linux-cachyos-server
          - linux-cachyos-eevdf
          - linux-cachyos-deckify
        default: linux-cachyos
      config_files:
        description: Config overrides (comma-separated, optional)
        required: false
        default: ''
      enable_lto:
        description: Enable ThinLTO
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Initialize pacman
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm --needed git nodejs

      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm --needed \
            base-devel fakeroot bc cpio xmlto \
            flex bison libelf openssl \
            python-sphinx python-sphinx_rtd_theme wget

      - name: Install LLVM/Clang toolchain
        run: |
          pacman -Sy --noconfirm --needed clang lld llvm

      - name: Clone CachyOS PKGBUILD repo
        run: |
          git clone --depth 1 https://github.com/CachyOS/linux-cachyos.git cachyos-pkgbuild

      - name: Apply custom config overrides
        if: ${{ github.event.inputs.config_files != '' }}
        run: |
          cd cachyos-pkgbuild/${{ github.event.inputs.kernel_variant }}
          IFS=',' read -ra CFGS <<< "${{ github.event.inputs.config_files }}"
          for cfg in "${CFGS[@]}"; do
            [ -f "$GITHUB_WORKSPACE/$cfg" ] \
              && cat "$GITHUB_WORKSPACE/$cfg" >> config \
              || echo "Warning: $cfg not found"
          done

      - name: Configure ThinLTO
        if: ${{ github.event.inputs.enable_lto == 'true' }}
        run: |
          cd cachyos-pkgbuild/${{ github.event.inputs.kernel_variant }}
          grep -q '^_use_llvm_lto=' PKGBUILD \
            && sed -i 's/_use_llvm_lto=.*/_use_llvm_lto="thin"/' PKGBUILD \
            || echo '_use_llvm_lto="thin"' >> PKGBUILD

      - name: Build kernel package
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"
          cd cachyos-pkgbuild/${{ github.event.inputs.kernel_variant }}
          su builder -c "
            cd \"$GITHUB_WORKSPACE/cachyos-pkgbuild/${{ github.event.inputs.kernel_variant }}\"
            makepkg -s --noconfirm --nocheck
          "
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp -v *.pkg.tar.zst "$GITHUB_WORKSPACE/artifacts/" 2>/dev/null || true

      - name: Extract bzImage
        run: |
          cd "$GITHUB_WORKSPACE/artifacts"
          PKG=$(ls *.pkg.tar.zst 2>/dev/null | head -1)
          [ -n "$PKG" ] && tar --zstd -xf "$PKG" -C /tmp/pkg-extract
          find /tmp/pkg-extract -name bzImage -exec cp -v {} ./ \; 2>/dev/null || true
          find /tmp/pkg-extract -name System.map -exec cp -v {} ./ \; 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-${{ github.event.inputs.kernel_variant }}
          path: artifacts/
