name: Build CachyOS Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_variant:
        description: Kernel variant
        required: true
        type: choice
        options:
          - linux-cachyos
          - linux-cachyos-bmq
          - linux-cachyos-bore
          - linux-cachyos-rc
          - linux-cachyos-lts
          - linux-cachyos-hardened
          - linux-cachyos-server
          - linux-cachyos-eevdf
          - linux-cachyos-rt-bore
          - linux-cachyos-deckify
        default: linux-cachyos
      enable_lto:
        description: Enable ThinLTO
        required: true
        type: choice
        options: ['true', 'false']
        default: 'true'
      enable_o3:
        description: Enable -O3 optimization
        required: true
        type: choice
        options: ['true', 'false']
        default: 'false'
      use_bbr3:
        description: Enable BBRv3 as default TCP congestion control
        required: true
        type: choice
        options: ['true', 'false']
        default: 'false'

permissions:
  contents: read

env:
  PKGBASE_SUFFIX: '-custom'
  _use_llvm_lto: ${{ github.event.inputs.enable_lto == 'true' && 'thin' || 'none' }}
  _kernel_cflags: ${{ github.event.inputs.enable_o3 == 'true' && '-O3' || '' }}
  _tcp_bbr3: ${{ github.event.inputs.use_bbr3 == 'true' && 'yes' || 'no' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: archlinux:latest
    defaults:
      run:
        shell: bash
    env:
      KERNEL_VARIANT: ${{ github.event.inputs.kernel_variant }}

    steps:
      - name: Initialize pacman
        run: |
          set -euxo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm --needed git nodejs

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pacman -S --noconfirm --needed \
            base-devel fakeroot sudo kmod \
            bc cpio xmlto flex bison libelf openssl \
            python-sphinx python-sphinx_rtd_theme \
            clang lld llvm wget zstd

      - name: Clone CachyOS PKGBUILD
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/CachyOS/linux-cachyos.git cachyos-pkgbuild
          test -f "cachyos-pkgbuild/$KERNEL_VARIANT/PKGBUILD"
          test -f "cachyos-pkgbuild/$KERNEL_VARIANT/config"

      - name: Customize package name
        run: |
          set -euxo pipefail
          cd "cachyos-pkgbuild/$KERNEL_VARIANT"
          sed -i "s/^pkgbase=.*/&${PKGBASE_SUFFIX}/" PKGBUILD
          grep '^pkgbase=' PKGBUILD

      - name: Build kernel packages
        run: |
          set -euxo pipefail
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

          runuser -u builder -- env \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            KERNEL_VARIANT="$KERNEL_VARIANT" \
            _use_llvm_lto="$_use_llvm_lto" \
            _kernel_cflags="$_kernel_cflags" \
            _tcp_bbr3="$_tcp_bbr3" \
            bash -lc '
              set -e
              cd "$GITHUB_WORKSPACE/cachyos-pkgbuild/$KERNEL_VARIANT"
              set +o pipefail
              yes "" | makepkg -s --noconfirm --nocheck --skipchecksums
              status=${PIPESTATUS[1]}
              set -o pipefail
              exit "$status"
            '

          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp -v cachyos-pkgbuild/"$KERNEL_VARIANT"/*.pkg.tar.zst "$GITHUB_WORKSPACE/artifacts/"

      - name: Create cross-distro archives
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/artifacts"

          PKG_BASE="${KERNEL_VARIANT}${PKGBASE_SUFFIX}"

          KERNEL_PKG="$(find . -maxdepth 1 -type f -name "${PKG_BASE}-*.pkg.tar.zst" ! -name "*-headers-*" -printf '%f\n' | sort | head -n 1)"
          [[ -z "$KERNEL_PKG" ]] && { echo "No kernel package found"; exit 1; }

          mkdir -p /tmp/kernel-extract
          tar --zstd -xf "$KERNEL_PKG" -C /tmp/kernel-extract

          KVER="$(find /tmp/kernel-extract/usr/lib/modules -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | head -n 1)"
          [[ -z "$KVER" ]] && { echo "No kernel modules found"; exit 1; }

          echo "Kernel release: $KVER"

          OUT="cachyos-kernel-$KVER"
          mkdir -p "$OUT/modules/$KVER"

          find /tmp/kernel-extract -type f -path "*/boot/vmlinuz*" -exec cp -v {} "$OUT/vmlinuz" \; -quit
          find /tmp/kernel-extract -type f -name "System.map*" -exec cp -v {} "$OUT/" \; -quit
          find /tmp/kernel-extract -type f -name "config*" -exec cp -v {} "$OUT/" \; -quit

          cp -a "/tmp/kernel-extract/usr/lib/modules/$KVER/"* "$OUT/modules/$KVER/"

          depmod -b "$PWD/$OUT" "$KVER"

          tar --zstd -chf "$OUT.tar.zst" "$OUT"
          rm -rf "$OUT"

          HEADERS_PKG="$(find . -maxdepth 1 -type f -name "${PKG_BASE}-headers-*.pkg.tar.zst" -printf '%f\n' | sort | head -n 1)"
          if [[ -n "$HEADERS_PKG" ]]; then
            mkdir -p "cachyos-headers-$KVER"
            tar --zstd -xf "$HEADERS_PKG" -C "cachyos-headers-$KVER"
            tar --zstd -chf "cachyos-headers-$KVER.tar.zst" "cachyos-headers-$KVER"
            rm -rf "cachyos-headers-$KVER"
          fi

          ls -lah

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-${{ env.KERNEL_VARIANT }}${{ env.PKGBASE_SUFFIX }}
          path: artifacts/
          if-no-files-found: error
          compression-level: 0
